name: MyInsureHopInfra

on:
  push:
    branches:
      - main
      - development
      - 'features/*'
  pull_request:
    branches:
      - main
      - development
      - 'features/*'
  workflow_dispatch:

env:
  TF_DIR: Insurance/environment/dev/

permissions:
  id-token: write
  contents: read

jobs:
  TerraformInitJob:
    name: 'Terraform checkout and Init Job'
    runs-on: Ankit-InsHop-Label

    env:
      AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Azure Login using OIDC
        uses: azure/login@v1
        with:
          client-id: ${{ env.AZURE_CLIENT_ID }}
          tenant-id: ${{ env.AZURE_TENANT_ID }}
          subscription-id: ${{ env.AZURE_SUBSCRIPTION_ID }}

      - name: Terraform Init
        id: Init
        run: terraform init -var "subscription_id=${{ secrets.AZURE_SUBSCRIPTION_ID }}"
