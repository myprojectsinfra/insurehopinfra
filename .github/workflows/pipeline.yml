name: MyInsureHopInfra

on:
  push:
    branches:
      - main
      - development
      - 'features/*'
  pull_request:
    branches:
      - main
      - development
      - 'features/*'
  workflow_dispatch:

env:
  TF_DIR: Insurance/environment/dev/
  AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
  AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
  AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

permissions:
  id-token: write
  contents: read

jobs:
  TerraformInitJob:
    name: 'Terraform checkout and Init Job'
    runs-on: Ankit-InsHop-Label

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Azure Login using OIDC
        uses: azure/login@v1
        with:
          client-id: ${{ env.AZURE_CLIENT_ID }}
          tenant-id: ${{ env.AZURE_TENANT_ID }}
          subscription-id: ${{ env.AZURE_SUBSCRIPTION_ID }}

      - name: Terraform Init
        id: Init
        run: terraform init -var "subscription_id=${{ secrets.AZURE_SUBSCRIPTION_ID }}"
        working-directory: ${{ env.TF_DIR }}
      - name: Terraform Fmt
        id: Fmt
        run: terraform fmt -check
        continue-on-error: true
        working-directory: ${{ env.TF_DIR }}  # Set the working directory to the "terraform-config" folder
      
      - name: Terraform Validate
        id: validate
        run: terraform validate
        working-directory: ${{ env.TF_DIR }}  # Set the working directory to the "terraform-config" folder
        
 TerraformSecurityScanJob:
    name: 'Terraform Security Scan Job'
    runs-on: Ankit-InsHop-Label
    steps:
      - name: TFLint
        id: tflint
        run: tflint
        working-directory: ${{ env.TF_DIR }}
